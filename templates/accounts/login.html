{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-3xl font-bold mb-6 text-center">ورود به حساب کاربری</h2>
    
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 mt-4">
            ورود
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="{% url 'accounts:password_reset' %}" class="text-blue-600 hover:underline">رمز عبور خود را فراموش کرده‌اید؟</a>
    </div>
    
    <div class="mt-4 text-center">
        <span class="text-gray-600">حساب کاربری ندارید؟</span>
        <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">ثبت‌نام کنید</a>
    </div>
</div>
{% endblock %}
